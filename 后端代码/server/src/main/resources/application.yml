server:
  port: 8000
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
    connection-timeout: 300000  # 5分钟连接超时
    max-connections: 10000
    accept-count: 1000
    threads:
      max: 200
      min-spare: 10

spring:
  application:
    name: smart-party-building
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_party_building?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: yu5201314
    type: com.alibaba.druid.pool.DruidDataSource
    
    # Druid连接池配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: 123456
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
  

  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 2048MB  # 增加到2GB
      max-request-size: 2048MB
      file-size-threshold: 2KB
      location: ${java.io.tmpdir}
      enabled: true
      resolve-lazily: false
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.pojo.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# PageHelper分页插件配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh-CN
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
  basic:
    enable: false

# JWT配置
jwt:
  secret: smart-party-building-jwt-secret-key-2024
  expiration: 7200000  # 2小时
  refresh-expiration: 604800000  # 7天

# 微信小程序配置
wechat:
  miniapp:
    appid: your_appid_here
    secret: your_secret_here
    token: your_token_here
    aes-key: your_aes_key_here

# 阿里云OSS配置
aliyun:
  oss:
    endpoint: your_endpoint_here
    access-key-id: your_access-key-id_here
    access-key-secret: your_access-key-secret_here
    bucket-name: your_bucket_name_here

# 日志配置
logging:
  level:
    com.example: debug
    org.springframework.web: debug
    org.mybatis: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/smart-party-building.log
